- name: Build proxmox API target list from inventory
  ansible.builtin.set_fact:
    proxmox_nodes: >-
      {{
        groups['proxmox']
        | default([])
        | map('extract', hostvars, 'ansible_host')
        | map('regex_replace', '$', ':8006')
        | list
      }}

- name: Build node exporter target list from inventory
  ansible.builtin.set_fact:
    node_exporter_targets: >-
      {{
        groups['proxmox']
        | default([])
        | map('extract', hostvars, 'ansible_host')
        | map('regex_replace', '$', ':9100')
        | list
      }}

- name: Initialize smartctl target list
  ansible.builtin.set_fact:
    smartctl_targets: []

- name: Add smartctl targets with hostname labels
  ansible.builtin.set_fact:
    smartctl_targets: >-
      {{
        smartctl_targets + [
          {
            'targets': [hostvars[item].ansible_host ~ ':9633'],
            'labels': {
              'node': item
            }
          }
        ]
      }}
  loop: "{{ groups['proxmox'] | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Build ceph target list from inventory
  ansible.builtin.set_fact:
    ceph_targets: >-
      {{
        groups['proxmox']
        | default([])
        | map('extract', hostvars, 'ansible_host')
        | map('regex_replace', '$', ':9283')
        | list
      }}
  when: monitor_ceph | bool