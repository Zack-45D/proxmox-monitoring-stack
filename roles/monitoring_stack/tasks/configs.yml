- name: Render Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_root }}/prometheus/prometheus.yml"
    mode: "0644"

- name: Render Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ monitoring_root }}/alertmanager/alertmanager.yml"
    mode: "0644"

- name: Render pve-exporter config
  ansible.builtin.template:
    src: pve.yml.j2
    dest: "{{ monitoring_root }}/pve-exporter/pve.yml"
    mode: "0644"

- name: Render Docker Compose config
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_root }}/compose/docker-compose.yml"
    mode: "0644"

- name: Render Ceph alert rules
  ansible.builtin.template:
    src: ceph.yml.j2
    dest: "{{ monitoring_root }}/prometheus/rules/ceph.yml"
    mode: "0644"

- name: Render Proxmox alert rules
  ansible.builtin.template:
    src: proxmox.yml.j2
    dest: "{{ monitoring_root }}/prometheus/rules/proxmox.yml"
    mode: "0644"

- name: Deploy hardware alert rules
  ansible.builtin.template:
    src: hardware.yml.j2
    dest: "{{ monitoring_root }}/prometheus/rules/hardware.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy ZFS alert rules
  ansible.builtin.template:
    src: zfs.yml.j2
    dest: "{{ monitoring_root }}/prometheus/rules/zfs.yml"
    mode: "0644"

- name: Deploy Grafana datasource provisioning
  template:
    src: grafana-datasource.yml.j2
    dest: /opt/monitoring/grafana/provisioning/datasources/datasource.yml
    mode: "0644"

- name: Deploy Grafana dashboard provider provisioning
  template:
    src: grafana-dashboard-provider.yml.j2
    dest: /opt/monitoring/grafana/provisioning/dashboards/dashboards.yml
    mode: "0644"

- name: Copy Grafana dashboards
  copy:
    src: grafana/dashboards/
    dest: /opt/monitoring/grafana/dashboards/
    mode: "0644"